<section class="main-layout">
  <aside class="sidenav" [class.collapsed]="collapsed">
    <div class="profile-container" [class.collapsed]="collapsed">
      <img src="/brand_icon_halftone-03.png" alt="Logo" class="sidebar-logo" />
    </div>

    <ng-container *ngIf="menuItems$ | async as menuItems; else emptyMenu">
      <nav class="sidebar-menu">
        <a
          *ngFor="let item of menuItems"
          [routerLink]="item.route"
          routerLinkActive="active"
          class="menu-item"
          [attr.aria-label]="item.label"
        >
          <span class="menu-icon material-symbols-rounded" aria-hidden="true">{{ item.icon }}</span>
          <ng-container *ngIf="!collapsed">
            <span class="menu-label">{{ item.label }}</span>
          </ng-container>
        </a>
      </nav>
    </ng-container>

    <ng-template #emptyMenu>
      <nav class="sidebar-menu"></nav>
    </ng-template>

    <button type="button" class="toggle-button" (click)="onToggleSidenav()">
      <span class="material-symbols-rounded" aria-hidden="true">{{ collapsed ? 'keyboard_double_arrow_right' : 'keyboard_double_arrow_left' }}</span>
    </button>
  </aside>

  <section class="content-layout">
    <header class="content-header card">
      <div>
        <p class="eyebrow">Evaluacion Tecnica</p>
        <h2>Bienvenido, {{ userName$ | async }}</h2>
      </div>
      <button type="button" class="btn btn-danger" (click)="onLogout()">Cerrar Sesion</button>
    </header>

    <main class="content-main">
      <router-outlet></router-outlet>
    </main>
  </section>
</section>
